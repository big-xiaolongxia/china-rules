name: Update China Rules

on:
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download mihomo binary
        run: |
          echo "Fetching latest mihomo release..."
          API_URL="https://api.github.com/repos/MetaCubeX/mihomo/releases/latest"
          DOWNLOAD_URL=$(curl -sL -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" "$API_URL" | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for a in d.get('assets', []):
              name = a['name']
              if 'linux-amd64-compatible' in name and name.endswith('.gz'):
                  print(a['browser_download_url'])
                  break
          ")
          echo "Downloading: $DOWNLOAD_URL"
          curl -fL -o mihomo.gz "$DOWNLOAD_URL"
          gunzip mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Download geoview binary
        run: |
          echo "Downloading geoview..."
          curl -fL -o geoview "https://github.com/snowie2000/geoview/releases/latest/download/geoview-linux-amd64"
          chmod +x geoview
          ./geoview -version || true

      - name: Download geosite.dat and geoip.dat
        run: |
          mkdir -p tmp
          for url in \
            "https://github.com/v2fly/domain-list-community/releases/latest/download/dlc.dat" \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"; do
            echo "Downloading $url"
            curl -fL --retry 3 -O "$url" || echo "trying next fallback..."
          done
          ls -la dlc.dat geoip.dat

      - name: Extract cn rules via geoview
        run: |
          ./geoview -type geosite -input dlc.dat -list geolocation-cn -output tmp/geosite_cn.txt
          ./geoview -type geoip -input geoip.dat -list cn -output tmp/geoip_cn.txt
          echo "=== geosite_cn.txt ==="
          wc -l tmp/geosite_cn.txt
          head -10 tmp/geosite_cn.txt
          echo "=== geoip_cn.txt ==="
          wc -l tmp/geoip_cn.txt
          head -10 tmp/geoip_cn.txt

      - name: Merge rules
        run: python scripts/merge_rules.py

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="rules"
          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "Release '$TAG' exists, updating..."
            gh release upload "$TAG" output/*.yaml output/*.mrs --clobber
          else
            echo "Release '$TAG' does not exist, creating..."
            gh release create "$TAG" output/*.yaml output/*.mrs \
              --title "rules" \
              --notes "China domain/IP rules. Updated on $(date -u '+%Y-%m-%d %H:%M UTC')"
          fi

      - name: Cleanup
        run: rm -rf tmp output mihomo mihomo.gz geoview dlc.dat geoip.dat
