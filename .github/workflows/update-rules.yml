name: Update China Rules

on:
  schedule:
    # Sunday 14:00 UTC = Sunday 22:00 Beijing
    - cron: "0 14 * * 0"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download mihomo binary
        run: |
          echo "Fetching latest mihomo release..."
          API_URL="https://api.github.com/repos/MetaCubeX/mihomo/releases/latest"
          DOWNLOAD_URL=$(curl -sL "$API_URL" | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for a in d.get('assets', []):
              name = a['name']
              if 'linux-amd64-compatible' in name and name.endswith('.gz'):
                  print(a['browser_download_url'])
                  break
          ")
          echo "Downloading: $DOWNLOAD_URL"
          curl -fL -o mihomo.gz "$DOWNLOAD_URL"
          gunzip mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: Download v2dat binary
        run: |
          echo "Fetching latest v2dat release..."
          API_URL="https://api.github.com/repos/urlesistiana/v2dat/releases/latest"
          DOWNLOAD_URL=$(curl -sL "$API_URL" | \
            python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          for a in d.get('assets', []):
              name = a['name']
              if 'linux' in name and 'amd64' in name:
                  print(a['browser_download_url'])
                  break
          ")
          echo "Downloading: $DOWNLOAD_URL"
          curl -fL -o v2dat.tar.gz "$DOWNLOAD_URL"
          tar xzf v2dat.tar.gz
          chmod +x v2dat
          ./v2dat || true

      - name: Download geosite.dat and geoip.dat
        run: |
          mkdir -p tmp

          # Loyalsoldier/v2ray-rules-dat provides up-to-date geo files
          for url in \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geosite.dat" \
            "https://github.com/Loyalsoldier/v2ray-rules-dat/releases/latest/download/geoip.dat"; do
            echo "Downloading $url"
            curl -fL --retry 3 -O "$url" || echo "trying next fallback..."
          done

          # Verify files exist
          ls -la geosite.dat geoip.dat

      - name: Extract geosite:cn and geoip:cn via v2dat
        run: |
          ./v2dat unpack geosite -f cn -d tmp geosite.dat
          ./v2dat unpack geoip -f cn -d tmp geoip.dat
          echo "=== Extracted files ==="
          ls -la tmp/geosite_cn.txt tmp/geoip_cn.txt
          echo "=== geosite_cn.txt sample ==="
          head -10 tmp/geosite_cn.txt
          echo "=== geoip_cn.txt sample ==="
          head -10 tmp/geoip_cn.txt

      - name: Merge rules
        run: python scripts/merge_rules.py

      - name: Create or update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="rules"

          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "Release '$TAG' exists, updating..."
            gh release upload "$TAG" output/*.yaml output/*.mrs --clobber
          else
            echo "Release '$TAG' does not exist, creating..."
            gh release create "$TAG" output/*.yaml output/*.mrs \
              --title "rules" \
              --notes "China domain/IP rules. Updated on $(date -u '+%Y-%m-%d %H:%M UTC')"
          fi

      - name: Cleanup
        run: rm -rf tmp output mihomo mihomo.gz v2dat v2dat.tar.gz geosite.dat geoip.dat
